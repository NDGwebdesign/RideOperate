<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RP Panel</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #3a3a3a, #1a1a1a);
            font-family: Arial, sans-serif;
        }
        .panel {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background-color: #4d4d4d;
            border: 3px solid #000;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .panel button {
            background-color: green;
            border: 2px solid black;
            border-radius: 50%;
            color: white;
            font-size: 16px;
            padding: 15px;
            width: 100px;
            height: 100px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .panel button:hover {
            background-color: darkgreen;
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const panelSelect = document.getElementById("panel-select");
            const panelDiv = document.getElementById("panel");

            // Fetch panels from the server
            fetch('/api/panels')
                .then(response => response.json())
                .then(data => {
                    data.panels.forEach(panel => {
                        const option = document.createElement("option");
                        option.value = panel;
                        option.textContent = panel;
                        panelSelect.appendChild(option);
                    });
                });

            // Add event listeners to buttons
            panelDiv.addEventListener("click", function (event) {
                if (event.target.tagName === "BUTTON") {
                    const panelName = panelSelect.value;
                    const action = event.target.textContent;

                    if (panelName) {
                        fetch(`/api/panels/${panelName}/${action}`, {
                            method: 'POST'
                        })
                        .then(response => response.json())
                        .then(data => {
                            alert(data.message);
                        });
                    } else {
                        alert("Select a panel first.");
                    }
                }
            });
        });
    </script>
</head>
<body>
<main>
    <select id="panel-select">
        <option value="">Select a panel</option>
    </select>
</main>
<div class="panel" id="panel">
    <button type="button">Power</button>
    <button type="button">Gates</button>
    <button type="button">Dispatch</button>
    <button type="button">Safety Bar</button>
</div>
</body>
</html>
